name: Extract ZIP

on:
  push:
    paths:
      - "*.zip"

jobs:
  unzip:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Unzip Files
        run: |
          mkdir extracted

          for file in *.zip
          do
            unzip -o "$file" -d extracted
          done

      - name: Push Extracted Files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add extracted
          git commit -m "Extract ZIP automatically"

          git push
